<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#080c10" />
  <title>AI Rig</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:       #080c10;
      --surface:  #0d1318;
      --border:   #1a2530;
      --accent:   #00e5ff;
      --accent2:  #ff4d6d;
      --accent3:  #39ff14;
      --text:     #a8d8f0;
      --muted:    #6aa8cc;
      --font-mono: 'Space Mono', monospace;
      --font-head: 'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orb */
    body::after {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,255,0.06) 0%, transparent 70%);
      top: -150px;
      right: -150px;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }

    /* ── Header ── */
    header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .logo {
      font-family: var(--font-head);
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
      line-height: 1;
    }

    .logo span { color: var(--accent); }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.4s, box-shadow 0.4s;
    }

    .dot.online   { background: var(--accent3); box-shadow: 0 0 8px var(--accent3); }
    .dot.starting { background: var(--accent);  box-shadow: 0 0 8px var(--accent); animation: pulse 1s infinite; }
    .dot.stopping { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: pulse 1s infinite; }
    .dot.offline  { background: var(--muted); box-shadow: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Config panel ── */
    .config-section {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: none;
    }

    .config-section.visible { display: block; }

    .config-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .field input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .field input:focus { border-color: var(--accent); }

    .btn-save {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-save:hover, .btn-save:active { background: var(--accent); color: var(--bg); }

    /* ── Main content ── */
    main {
      flex: 1;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Status card ── */
    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .status-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.5s;
    }

    .status-card.active::before { opacity: 1; }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .status-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .status-value {
      font-size: 22px;
      font-family: var(--font-head);
      font-weight: 800;
      color: #fff;
      margin: 4px 0 8px;
    }

    .status-value.running { color: var(--accent3); }
    .status-value.starting { color: var(--accent); }
    .status-value.stopping { color: var(--accent2); }

    .pod-id {
      font-size: 10px;
      color: var(--muted);
      font-family: var(--font-mono);
      word-break: break-all;
    }

    .cost-badge {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--accent);
    }

    /* ── Action buttons ── */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .action-grid.single { grid-template-columns: 1fr; }

    .btn {
      padding: 16px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { transform: scale(0.97); }

    .btn .icon {
      font-size: 24px;
      line-height: 1;
    }

    .btn.primary {
      border-color: var(--accent);
      color: var(--accent);
      grid-column: 1 / -1;
      flex-direction: row;
      padding: 18px;
      font-size: 13px;
      letter-spacing: 2px;
    }

    .btn.primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn.primary:active::after { opacity: 0.1; }

    .btn.danger {
      border-color: var(--accent2);
      color: var(--accent2);
      grid-column: 1 / -1;
    }

    .btn.open-st {
      border-color: rgba(57,255,20,0.4);
      color: var(--accent3);
    }

    .btn.open-forge {
      border-color: rgba(0,229,255,0.4);
      color: var(--accent);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      pointer-events: none;
    }

    .btn .shimmer {
      position: absolute;
      top: -50%; left: -75%;
      width: 50%; height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
      transform: skewX(-20deg);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { left: -75%; }
      100% { left: 125%; }
    }

    /* ── Log terminal ── */
    .log-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .log-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .log-title {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .log-clear {
      font-size: 9px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-mono);
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0;
    }

    .log-body {
      padding: 12px 14px;
      height: 130px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .log-line {
      font-size: 11px;
      line-height: 1.5;
      color: var(--muted);
      display: flex;
      gap: 8px;
    }

    .log-line .ts {
      color: #4a7a9a;
      flex-shrink: 0;
    }

    .log-line.info .msg { color: var(--text); }
    .log-line.success .msg { color: var(--accent3); }
    .log-line.error .msg { color: var(--accent2); }
    .log-line.accent .msg { color: var(--accent); }

    /* ── Settings toggle ── */
    footer {
      padding: 12px 20px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
    }

    .settings-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 20px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .settings-btn:active { border-color: var(--accent); color: var(--accent); }

    /* ── Scan line animation on load ── */
    @keyframes scanline {
      0% { top: -5%; }
      100% { top: 105%; }
    }

    .scanline {
      position: fixed;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,0.2), transparent);
      z-index: 999;
      animation: scanline 2s ease-in-out forwards;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div class="scanline"></div>

<div class="app">

  <header>
    <div class="logo">AI<span>.</span>RIG</div>
    <div class="status-pill">
      <div class="dot offline" id="headerDot"></div>
      <span id="headerStatus">OFFLINE</span>
    </div>
  </header>

  <!-- Config panel (hidden until settings tapped) -->
  <div class="config-section" id="configPanel">
    <div class="config-label">Configuration</div>
    <div class="input-row">
      <div class="field">
        <label>RunPod API Key</label>
        <input type="password" id="cfgApiKey" placeholder="rpa_xxxxxxxxxxxx" />
      </div>
      <div class="field">
        <label>Template ID</label>
        <input type="text" id="cfgTemplateId" placeholder="abc123xyz" />
      </div>
      <div class="field">
        <label>Network Volume ID</label>
        <input type="text" id="cfgVolumeId" placeholder="vol_xxxxxxxx" />
      </div>
    </div>
    <button class="btn-save" onclick="saveConfig()">Save Configuration</button>
  </div>

  <main>

    <!-- Status card -->
    <div class="status-card" id="statusCard">
      <div class="status-row">
        <span class="status-label">Pod Status</span>
        <span class="cost-badge" id="costBadge">RTX 4090</span>
      </div>
      <div class="status-value" id="statusValue">OFFLINE</div>
      <div class="pod-id" id="podIdDisplay">No pod running</div>
    </div>

    <!-- Action buttons — state machine drives visibility -->
    <div id="actionsOffline">
      <div class="action-grid single">
        <button class="btn primary" onclick="startPod()">
          <div class="shimmer"></div>
          <span class="icon">⚡</span>
          <span>DEPLOY POD</span>
        </button>
      </div>
    </div>

    <div id="actionsStarting" style="display:none">
      <div class="action-grid single">
        <button class="btn primary" disabled>
          <span class="icon">⏳</span>
          <span>INITIALISING...</span>
        </button>
      </div>
    </div>

    <div id="actionsOnline" style="display:none">
      <div class="action-grid">
        <button class="btn open-st" onclick="openSillyTavern()">
          <span class="icon">💬</span>
          <span>SillyTavern</span>
        </button>
        <button class="btn open-forge" onclick="openForge()">
          <span class="icon">🎨</span>
          <span>Forge</span>
        </button>
        <button class="btn danger" onclick="stopPod()">
          <span class="icon">⏹</span>
          <span>STOP &amp; SAVE COSTS</span>
        </button>
      </div>
    </div>

    <div id="actionsStopping" style="display:none">
      <div class="action-grid single">
        <button class="btn danger" disabled>
          <span class="icon">⏳</span>
          <span>STOPPING...</span>
        </button>
      </div>
    </div>

    <!-- Log terminal -->
    <div class="log-section">
      <div class="log-header">
        <span class="log-title">System Log</span>
        <button class="log-clear" onclick="clearLog()">Clear</button>
      </div>
      <div class="log-body" id="logBody"></div>
    </div>

  </main>

  <footer>
    <button class="settings-btn" onclick="toggleConfig()">⚙ Settings</button>
  </footer>

</div>

<script>
  // ── CONFIG ─────────────────────────────────────────────────────────────────
  // Fill these in, or use the Settings panel on your phone.
  const DEFAULT_API_KEY     = '';   // Your RunPod API key
  const DEFAULT_TEMPLATE_ID = '';   // Your template ID
  const DEFAULT_VOLUME_ID   = '';   // Your network volume ID

  const ST_PORT    = 8000;
  const FORGE_PORT = 7860;
  const POLL_MS    = 5000;   // Poll every 5 seconds while starting

  // ── STATE ──────────────────────────────────────────────────────────────────
  let state = {
    status: 'offline', // offline | starting | running | stopping
    podId: null,
    podProxyBase: null,
    pollTimer: null,
  };

  // ── STORAGE ────────────────────────────────────────────────────────────────
  function cfg() {
    return {
      apiKey:     localStorage.getItem('rp_apiKey')     || DEFAULT_API_KEY,
      templateId: localStorage.getItem('rp_templateId') || DEFAULT_TEMPLATE_ID,
      volumeId:   localStorage.getItem('rp_volumeId')   || DEFAULT_VOLUME_ID,
    };
  }

  function saveConfig() {
    localStorage.setItem('rp_apiKey',     document.getElementById('cfgApiKey').value.trim());
    localStorage.setItem('rp_templateId', document.getElementById('cfgTemplateId').value.trim());
    localStorage.setItem('rp_volumeId',   document.getElementById('cfgVolumeId').value.trim());
    log('Configuration saved.', 'success');
    toggleConfig();
  }

  function loadConfigFields() {
    const c = cfg();
    document.getElementById('cfgApiKey').value     = c.apiKey;
    document.getElementById('cfgTemplateId').value = c.templateId;
    document.getElementById('cfgVolumeId').value   = c.volumeId;
  }

  // ── UI HELPERS ─────────────────────────────────────────────────────────────
  function setStatus(s) {
    state.status = s;
    const labels = { offline:'OFFLINE', starting:'STARTING', running:'RUNNING', stopping:'STOPPING' };
    const dotCls = { offline:'offline', starting:'starting', running:'online', stopping:'stopping' };

    document.getElementById('statusValue').textContent   = labels[s] || s.toUpperCase();
    document.getElementById('statusValue').className     = `status-value ${s}`;
    document.getElementById('headerStatus').textContent  = labels[s] || s.toUpperCase();
    document.getElementById('headerDot').className       = `dot ${dotCls[s] || 'offline'}`;
    document.getElementById('statusCard').className      = `status-card ${s === 'running' ? 'active' : ''}`;

    document.getElementById('actionsOffline').style.display  = s === 'offline'  ? '' : 'none';
    document.getElementById('actionsStarting').style.display = s === 'starting' ? '' : 'none';
    document.getElementById('actionsOnline').style.display   = s === 'running'  ? '' : 'none';
    document.getElementById('actionsStopping').style.display = s === 'stopping' ? '' : 'none';
  }

  function setPodInfo(podId, proxyBase) {
    state.podId = podId;
    state.podProxyBase = proxyBase;
    document.getElementById('podIdDisplay').textContent = podId
      ? `Pod: ${podId}`
      : 'No pod running';
  }

  function log(msg, type = 'info') {
    const body = document.getElementById('logBody');
    const now  = new Date();
    const ts   = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    const el   = document.createElement('div');
    el.className = `log-line ${type}`;
    el.innerHTML = `<span class="ts">${ts}</span><span class="msg">${msg}</span>`;
    body.appendChild(el);
    body.scrollTop = body.scrollHeight;
  }

  function clearLog() {
    document.getElementById('logBody').innerHTML = '';
  }

  function toggleConfig() {
    const panel = document.getElementById('configPanel');
    const vis   = panel.classList.toggle('visible');
    if (vis) loadConfigFields();
  }

  // ── RUNPOD GRAPHQL API ─────────────────────────────────────────────────────
  async function gql(query, variables = {}) {
    const c = cfg();
    if (!c.apiKey) throw new Error('No API key configured. Tap ⚙ Settings.');
    const res = await fetch(`https://runpod-proxy.jrm-rdn-anon.workers.dev?api_key=${c.apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, variables }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (json.errors) throw new Error(json.errors[0].message);
    return json.data;
  }

  // Build the RunPod proxy URL for a given pod + port
  function proxyUrl(podId, port) {
    return `https://${podId}-${port}.proxy.runpod.net`;
  }

  // ── POD ACTIONS ────────────────────────────────────────────────────────────
  async function startPod() {
    const c = cfg();
    if (!c.apiKey || !c.templateId) {
      log('Missing API key or Template ID. Tap ⚙ Settings.', 'error');
      return;
    }

    setStatus('starting');
    log('Deploying pod from template…', 'accent');

    try {
      const mutation = `
        mutation deployPod($input: PodFindAndDeployOnDemandInput!) {
          podFindAndDeployOnDemand(input: $input) {
            id desiredStatus costPerHr
          }
        }`;

      const input = {
        templateId: c.templateId,
        gpuTypeId: 'NVIDIA GeForce RTX 4090',
        gpuCount: 1,
        cloudType: 'SECURE',
        name: 'ai-rig',
        startSsh: false,
      };
      if (c.volumeId) input.networkVolumeId = c.volumeId;

      const data = await gql(mutation, { input });
      const pod  = data.podFindAndDeployOnDemand;
      const podId = pod.id;

      log(`Pod created: ${podId}`, 'success');
      setPodInfo(podId, null);
      pollUntilRunning(podId);

    } catch (err) {
      log(`Deploy failed: ${err.message}`, 'error');
      setStatus('offline');
    }
  }

  async function pollUntilRunning(podId) {
    clearInterval(state.pollTimer);
    state.pollTimer = setInterval(async () => {
      try {
        const query = `
          query pod($id: String!) {
            pod(input: { podId: $id }) {
              id desiredStatus costPerHr
            }
          }`;
        const data   = await gql(query, { id: podId });
        const pod    = data.pod;
        const status = (pod.desiredStatus || '').toUpperCase();
        log(`Pod status: ${status}`, 'info');

        if (status === 'RUNNING') {
          clearInterval(state.pollTimer);
          setPodInfo(podId, proxyUrl(podId, ''));
          setStatus('running');
          log('Pod is live! Services available.', 'success');
          document.getElementById('costBadge').textContent = `~$${(pod.costPerHr || 0).toFixed(3)}/hr`;
        }
      } catch (err) {
        log(`Poll error: ${err.message}`, 'error');
      }
    }, POLL_MS);
  }

  async function stopPod() {
    if (!state.podId) return;
    setStatus('stopping');
    log(`Stopping pod ${state.podId}…`, 'accent');

    try {
      // Terminate removes the pod entirely — billing stops, volume is preserved
      const mutation = `
        mutation terminate($input: PodTerminateInput!) {
          podTerminate(input: $input)
        }`;
      await gql(mutation, { input: { podId: state.podId } });
      log('Pod terminated. Billing stopped, volume preserved.', 'success');
    } catch (err) {
      log(`Stop error: ${err.message}`, 'error');
    }

    clearInterval(state.pollTimer);
    setPodInfo(null, null);
    setStatus('offline');
    document.getElementById('costBadge').textContent = 'RTX 4090';
  }

  // ── OPEN SERVICES ─────────────────────────────────────────────────────────
  function openSillyTavern() {
    if (!state.podId) return;
    window.open(proxyUrl(state.podId, ST_PORT), '_blank');
  }

  function openForge() {
    if (!state.podId) return;
    window.open(proxyUrl(state.podId, FORGE_PORT), '_blank');
  }

  // ── INIT ───────────────────────────────────────────────────────────────────
  window.addEventListener('load', async () => {
    log('AI Rig controller ready.', 'accent');
    const c = cfg();
    if (!c.apiKey) {
      log('No API key found. Tap ⚙ Settings to configure.', 'error');
      return;
    }
    // Check if a pod is already running on load
    log('Checking for existing pods…', 'info');
    try {
      const query = `
        query {
          myself {
            pods {
              id desiredStatus costPerHr templateId
            }
          }
        }`;
      const data = await gql(query);
      const pods = data.myself.pods || [];
      const running = pods.find(p =>
        p.templateId === c.templateId &&
        (p.desiredStatus || '').toUpperCase() === 'RUNNING'
      );
      if (running) {
        setPodInfo(running.id, proxyUrl(running.id, ''));
        setStatus('running');
        document.getElementById('costBadge').textContent = `~$${(running.costPerHr || 0).toFixed(3)}/hr`;
        log(`Found running pod: ${running.id}`, 'success');
      } else {
        log('No running pods found.', 'info');
      }
    } catch (err) {
      log(`Could not check pods: ${err.message}`, 'error');
    }
  });
</script>

</body>
</html>
